<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NoteVault – AWS Architecture Diagram</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 40px 20px; }
  h1 { text-align: center; font-size: 1.5rem; color: #38bdf8; margin-bottom: 8px; }
  .subtitle { text-align: center; color: #64748b; font-size: 0.85rem; margin-bottom: 40px; }
  svg { display: block; margin: 0 auto; max-width: 100%; }
  .legend { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; margin-top: 32px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: #94a3b8; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
</style>
</head>
<body>
<h1>NoteVault — AWS Architecture</h1>
<p class="subtitle">Associate Cloud Engineer Technical Assessment · Production Deployment</p>

<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#0f172a"/>

  <!-- Internet -->
  <ellipse cx="100" cy="80" rx="70" ry="40" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="100" y="75" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">🌐</text>
  <text x="100" y="92" text-anchor="middle" fill="#94a3b8" font-size="11">Internet</text>

  <!-- Arrow: Internet → SG -->
  <line x1="170" y1="80" x2="230" y2="80" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)" stroke-dasharray="4,3"/>
  <text x="200" y="72" text-anchor="middle" fill="#64748b" font-size="9">80 / 443</text>

  <!-- AWS Security Group box -->
  <rect x="230" y="30" width="140" height="100" rx="8" fill="#1a2744" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="300" y="52" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="700">AWS Security Group</text>
  <text x="300" y="70" text-anchor="middle" fill="#64748b" font-size="9">✅ Port 80 open</text>
  <text x="300" y="84" text-anchor="middle" fill="#64748b" font-size="9">✅ Port 443 open</text>
  <text x="300" y="98" text-anchor="middle" fill="#ef4444" font-size="9">🔒 Port 5432 blocked</text>
  <text x="300" y="112" text-anchor="middle" fill="#ef4444" font-size="9">🔒 Port 8000 blocked</text>

  <!-- Arrow: SG → EC2 -->
  <line x1="370" y1="80" x2="420" y2="80" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- EC2 Instance box -->
  <rect x="420" y="10" width="450" height="580" rx="12" fill="#111827" stroke="#1d4ed8" stroke-width="2"/>
  <text x="645" y="36" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="700">EC2 t2.micro (Ubuntu 22.04)</text>
  <text x="645" y="52" text-anchor="middle" fill="#475569" font-size="10">Docker Compose orchestrated containers</text>

  <!-- Nginx container -->
  <rect x="440" y="65" width="410" height="80" rx="8" fill="#1a3a2a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="500" y="88" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700">🔀 Nginx</text>
  <text x="500" y="104" text-anchor="middle" fill="#86efac" font-size="9">Reverse Proxy</text>
  <text x="500" y="118" text-anchor="middle" fill="#64748b" font-size="9">SSL Termination</text>
  <text x="720" y="88" text-anchor="middle" fill="#64748b" font-size="9">/api/* → backend:8000</text>
  <text x="720" y="104" text-anchor="middle" fill="#64748b" font-size="9">/* → frontend:80</text>
  <text x="720" y="118" text-anchor="middle" fill="#64748b" font-size="9">/static/ → volume</text>

  <!-- Arrow: Nginx → Backend -->
  <line x1="550" y1="145" x2="550" y2="195" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="570" y="175" fill="#64748b" font-size="9">/api/*</text>

  <!-- Arrow: Nginx → Frontend -->
  <line x1="750" y1="145" x2="750" y2="195" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="760" y="175" fill="#64748b" font-size="9">/*</text>

  <!-- Backend container -->
  <rect x="440" y="195" width="200" height="100" rx="8" fill="#1e2a4a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="540" y="220" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="700">🐍 Django Backend</text>
  <text x="540" y="238" text-anchor="middle" fill="#93c5fd" font-size="9">Django REST Framework</text>
  <text x="540" y="254" text-anchor="middle" fill="#64748b" font-size="9">Gunicorn (3 workers)</text>
  <text x="540" y="270" text-anchor="middle" fill="#64748b" font-size="9">Port 8000 (internal only)</text>

  <!-- Frontend container -->
  <rect x="655" y="195" width="200" height="100" rx="8" fill="#2a1e4a" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="755" y="220" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">⚛️ React Frontend</text>
  <text x="755" y="238" text-anchor="middle" fill="#ddd6fe" font-size="9">React 18 + Axios</text>
  <text x="755" y="254" text-anchor="middle" fill="#64748b" font-size="9">Served via Nginx</text>
  <text x="755" y="270" text-anchor="middle" fill="#64748b" font-size="9">Port 80 (internal only)</text>

  <!-- Arrow: Backend → DB -->
  <line x1="540" y1="295" x2="540" y2="355" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PostgreSQL container -->
  <rect x="440" y="355" width="200" height="90" rx="8" fill="#2a1a1a" stroke="#f87171" stroke-width="1.5"/>
  <text x="540" y="380" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">🐘 PostgreSQL 15</text>
  <text x="540" y="398" text-anchor="middle" fill="#fca5a5" font-size="9">Internal network only</text>
  <text x="540" y="414" text-anchor="middle" fill="#64748b" font-size="9">Persistent volume</text>
  <text x="540" y="430" text-anchor="middle" fill="#ef4444" font-size="9">🔒 NOT exposed publicly</text>

  <!-- Certbot container -->
  <rect x="440" y="465" width="200" height="70" rx="8" fill="#1a2a1a" stroke="#86efac" stroke-width="1"/>
  <text x="540" y="490" text-anchor="middle" fill="#86efac" font-size="10" font-weight="700">🔐 Certbot</text>
  <text x="540" y="507" text-anchor="middle" fill="#64748b" font-size="9">Let's Encrypt SSL</text>
  <text x="540" y="522" text-anchor="middle" fill="#64748b" font-size="9">Auto-renewal every 12h</text>

  <!-- Docker network label -->
  <rect x="430" y="550" width="430" height="28" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="645" y="569" text-anchor="middle" fill="#64748b" font-size="10">🔗 Docker Internal Network — containers communicate by service name</text>

  <!-- Arrow: Backend → S3 -->
  <path d="M 640 245 Q 820 245 820 380" stroke="#f59e0b" stroke-width="1.5" fill="none" marker-end="url(#arrow)" stroke-dasharray="5,3"/>

  <!-- S3 box -->
  <rect x="655" y="355" width="200" height="90" rx="8" fill="#2a2200" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="755" y="380" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700">☁️ AWS S3</text>
  <text x="755" y="398" text-anchor="middle" fill="#fde68a" font-size="9">File uploads storage</text>
  <text x="755" y="414" text-anchor="middle" fill="#64748b" font-size="9">Least privilege IAM</text>
  <text x="755" y="430" text-anchor="middle" fill="#64748b" font-size="9">us-east-1</text>

  <!-- IAM label -->
  <rect x="655" y="465" width="200" height="70" rx="8" fill="#1f1a00" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="755" y="490" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">🛡️ IAM User</text>
  <text x="755" y="507" text-anchor="middle" fill="#64748b" font-size="9">s3:GetObject / PutObject</text>
  <text x="755" y="522" text-anchor="middle" fill="#64748b" font-size="9">DeleteObject / ListBucket only</text>

  <!-- Flow labels -->
  <text x="100" y="580" fill="#1d4ed8" font-size="10">① HTTPS request</text>
  <text x="100" y="595" fill="#22c55e" font-size="10">② Nginx routes traffic</text>
  <text x="300" y="580" fill="#3b82f6" font-size="10">③ Django processes API</text>
  <text x="300" y="595" fill="#f59e0b" font-size="10">④ Files → S3</text>
</svg>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>Nginx (Reverse Proxy)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>Django Backend</div>
  <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div>React Frontend</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f87171"></div>PostgreSQL (Internal)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>AWS S3</div>
  <div class="legend-item"><div class="legend-dot" style="background:#86efac"></div>Certbot / SSL</div>
</div>
</body>
</html>
